<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pani Puri Time 🍡</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&family=Pacifico&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #2d9e4f;
    --yellow: #f5c518;
    --orange: #f07b20;
    --brown: #7b3f00;
    --cream: #fff8ee;
    --fool-bg: #ff3b6b;
    --fool-accent: #ffe600;
  }

  body {
    font-family: 'Baloo 2', cursive;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: var(--cream);
    cursor: pointer;
  }

  /* ── BACKGROUND DRIPS ── */
  .bg-drip {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    background:
      radial-gradient(circle at 15% 20%, #ffe0a020 0%, transparent 40%),
      radial-gradient(circle at 85% 80%, #f07b2020 0%, transparent 40%);
  }

  /* ── CARD FLIP WRAPPER ── */
  .scene {
    perspective: 1200px;
    width: min(92vw, 420px);
    height: min(92vw, 580px);
    z-index: 1;
  }

  .card {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.85s cubic-bezier(.55,.05,.15,1.2);
  }

  .card.flipped { transform: rotateY(180deg); }

  .face {
    position: absolute; inset: 0;
    border-radius: 32px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; padding: 36px 28px;
    text-align: center;
    overflow: hidden;
  }

  /* ════ FRONT — PANI PURI ════ */
  .front {
    background: linear-gradient(145deg, #fff4d6, #fde7b0);
    border: 3px solid var(--orange);
    box-shadow: 0 12px 40px #f07b2033, inset 0 -4px 0 #f5c51844;
  }

  .front::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent 0px, transparent 18px,
      #f5c51808 18px, #f5c51808 20px
    );
    border-radius: 32px;
  }

  .bowl-wrap {
    position: relative;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-12px); }
  }

  .bowl { font-size: 100px; line-height: 1; filter: drop-shadow(0 8px 12px #f07b2040); }

  .steam {
    position: absolute; top: -10px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px;
  }

  .steam span {
    display: block; width: 5px; height: 28px;
    background: linear-gradient(to top, #f07b2060, transparent);
    border-radius: 99px;
    animation: rise 2s ease-in-out infinite;
    opacity: 0;
  }
  .steam span:nth-child(1) { animation-delay: 0s; }
  .steam span:nth-child(2) { animation-delay: 0.4s; height: 22px; }
  .steam span:nth-child(3) { animation-delay: 0.8s; }

  @keyframes rise {
    0%   { opacity: 0; transform: translateY(0) scaleX(1); }
    40%  { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(-30px) scaleX(2); }
  }

  .front-title {
    font-family: 'Pacifico', cursive;
    font-size: clamp(26px, 7vw, 38px);
    color: var(--brown);
    line-height: 1.15;
    text-shadow: 2px 2px 0 #f5c51888;
  }

  .front-sub {
    font-size: 14px; font-weight: 700;
    color: var(--green);
    letter-spacing: 2px; text-transform: uppercase;
    background: #2d9e4f18; border-radius: 99px;
    padding: 6px 18px; border: 1px solid #2d9e4f44;
  }

  .tap-btn {
    margin-top: 8px;
    background: linear-gradient(135deg, var(--orange), #e65c00);
    color: #fff;
    font-family: 'Baloo 2', cursive;
    font-size: 17px; font-weight: 800;
    border: none; border-radius: 99px;
    padding: 14px 36px;
    box-shadow: 0 6px 20px #f07b2050;
    cursor: pointer;
    animation: pulse-btn 2s ease-in-out infinite;
    transition: transform .15s;
  }

  .tap-btn:hover { transform: scale(1.06); }

  @keyframes pulse-btn {
    0%, 100% { box-shadow: 0 6px 20px #f07b2050; }
    50%       { box-shadow: 0 6px 30px #f07b2090; }
  }

  .spice-row { display: flex; gap: 8px; font-size: 22px; }

  /* ════ BACK — APRIL FOOL ════ */
  .back {
    transform: rotateY(180deg);
    background: var(--fool-bg);
    border: 3px solid var(--fool-accent);
    box-shadow: 0 12px 50px #ff3b6b55;
    overflow: visible;
  }

  .confetti-ring {
    position: absolute; inset: -30px;
    border-radius: 50%;
    pointer-events: none;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    width: 10px; height: 18px;
    border-radius: 3px;
    animation: conffall 3s linear infinite;
    opacity: 0;
  }

  @keyframes conffall {
    0%   { opacity: 1; transform: translateY(-40px) rotate(0deg); }
    100% { opacity: 0; transform: translateY(540px) rotate(720deg); }
  }

  .fool-title {
    font-family: 'Pacifico', cursive;
    font-size: clamp(34px, 10vw, 56px);
    color: var(--fool-accent);
    line-height: 1.1;
    text-shadow: 4px 4px 0 #c0003066, 0 0 40px #ffe60088;
    animation: wobble 0.5s ease-in-out infinite alternate;
  }

  @keyframes wobble {
    0%   { transform: rotate(-3deg) scale(1); }
    100% { transform: rotate(3deg) scale(1.04); }
  }

  .emoji-burst {
    font-size: clamp(38px, 10vw, 58px);
    display: flex; flex-wrap: wrap;
    justify-content: center; gap: 6px;
    animation: pop 0.6s cubic-bezier(.3,1.6,.5,1) both;
  }

  @keyframes pop {
    0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg);   opacity: 1; }
  }

  .fool-msg {
    font-size: 16px; font-weight: 700;
    color: #fff;
    background: #ffffff22;
    border-radius: 99px; padding: 8px 24px;
    letter-spacing: 1px;
  }

  .fool-sub {
    font-size: 13px; color: #ffccd8;
    font-weight: 600; letter-spacing: 1.5px;
  }

  /* ── PHOTO STRIP ── */
  .photo-strip {
    width: calc(100% + 56px);
    margin: 4px -28px 0;
    overflow: hidden;
    border-radius: 16px;
    position: relative;
  }

  .photo-track {
    display: flex;
    gap: 10px;
    animation: scrollStrip 18s linear infinite;
    width: max-content;
  }

  .photo-strip:hover .photo-track { animation-play-state: paused; }

  @keyframes scrollStrip {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .photo-track .svg-card {
    height: 90px;
    width: 120px;
    border-radius: 12px;
    border: 2px solid #f07b2044;
    flex-shrink: 0;
    transition: transform .3s, box-shadow .3s;
    filter: drop-shadow(0 3px 6px #f07b2022);
  }

  .photo-track .svg-card:hover {
    transform: scale(1.07);
    filter: drop-shadow(0 6px 14px #f07b2055);
  }

  .strip-fade-l, .strip-fade-r {
    position: absolute; top: 0; bottom: 0; width: 28px;
    z-index: 2; pointer-events: none;
  }
  .strip-fade-l { left: 0;  background: linear-gradient(to right, #fff8ee, transparent); }
  .strip-fade-r { right: 0; background: linear-gradient(to left,  #fff8ee, transparent); }

  /* ── FLOATING EMOJI BG ── */
  .float-emojis {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    display: none;
  }

  .float-emojis.show { display: block; }

  .fe {
    position: absolute;
    font-size: 28px;
    animation: floatUp 4s ease-in infinite;
    opacity: 0;
  }

  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(20px); }
    20%  { opacity: 1; }
    80%  { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-120px); }
  }
</style>
</head>

<script>
  let revealed = false;

  // Build confetti pieces
  const ring = document.getElementById('confRing');
  const colors = ['#ffe600','#fff','#ff90b3','#00e5ff','#b2ff59','#ffab40'];
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*10}%;
      background:${colors[i % colors.length]};
      animation-delay:${Math.random()*3}s;
      animation-duration:${2.5 + Math.random()*2}s;
      transform:rotate(${Math.random()*360}deg);
    `;
    ring.appendChild(p);
  }

  function revealFool() {
    if (revealed) return;
    revealed = true;

    const card = document.getElementById('card');
    card.classList.add('flipped');

    // Stagger the back face elements in
    setTimeout(() => {
      const emojiBurst = document.getElementById('emojiBurst');
      emojiBurst.innerHTML = '😂 🤣 😜 😝 🤪 😆 🥳 😹';
      fade(emojiBurst, 0);
    }, 600);

    setTimeout(() => fade(document.getElementById('foolTitle'), 0), 900);
    setTimeout(() => fade(document.getElementById('foolMsg'),  0), 1150);
    setTimeout(() => fade(document.getElementById('foolSub'),  0), 1350);

    // Launch floating emojis in background
    launchFloaters();
  }

  function fade(el, delay) {
    el.style.transition = 'opacity 0.5s, transform 0.5s';
    el.style.transform = 'scale(0.8)';
    requestAnimationFrame(() => {
      setTimeout(() => {
        el.style.opacity = '1';
        el.style.transform = 'scale(1)';
      }, delay);
    });
  }

  function launchFloaters() {
    const container = document.getElementById('floaters');
    container.classList.add('show');
    const emojis = ['😂','🤣','😜','🥳','🎭','🃏','😹','😆','🤪','😝','🎉','✨'];
    setInterval(() => {
      const fe = document.createElement('div');
      fe.className = 'fe';
      fe.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      fe.style.cssText = `
        left:${Math.random()*95}%;
        bottom:${-30 + Math.random()*20}px;
        animation-delay:${Math.random()*1.5}s;
        animation-duration:${3 + Math.random()*2}s;
        font-size:${20 + Math.random()*22}px;
      `;
      container.appendChild(fe);
      setTimeout(() => fe.remove(), 6000);
    }, 200);
  }
</script>
